server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: ${SPRING_APPLICATION_NAME:invoice-service}
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 2000
      keepalive-time: 30000
      max-lifetime: 1800000
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

fakturownia:
  url: ${INVOICES_URL:http://localhost:3000}
  token: ${INVOICES_TOKEN:test-token}


management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_API_DOCS_SWAGGER_ENABLED:false}