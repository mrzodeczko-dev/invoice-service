databaseChangeLog:
  - changeSet:
      id: 2
      author: mrzodeczko-dev
      changes:
        - createTable:
            tableName: invoice_items
            columns:
              - column:
                  name: invoice_id
                  type: CHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: tax_rate
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: invoice_items
            baseColumnNames: invoice_id
            referencedTableName: invoices
            referencedColumnNames: id
            constraintName: fk_invoice_items_invoice_id